<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentora AI – Generate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1>Mentora AI</h1>
            <span class="badge">Career Constellation</span>
            <p class="tagline">Every student deserves to see their future light up.</p>
        </header>

        <section class="card">
            <div class="form-group">
                <select id="degreeSelect">
                    <option value="BCA">BCA</option>
                    <option value="B.Tech CSE">B.Tech CSE</option>
                    <option value="B.Sc CS">B.Sc CS</option>
                </select>
                <select id="fieldSelect">
                    <option value="AI/ML">AI/ML</option>
                    <option value="Frontend Development">Frontend Development</option>
                    <option value="Full Stack">Full Stack</option>
                </select>
                <select id="levelSelect">
                    <option value="beginner">beginner</option>
                    <option value="intermediate">intermediate</option>
                </select>
                <button type="button" id="generateBtn">✨ Generate Roadmap</button>
            </div>
        </section>
    </div>

    <script>
        document.getElementById("generateBtn").addEventListener("click", function() {
            const degree = document.getElementById("degreeSelect").value;
            const field = document.getElementById("fieldSelect").value;
            const level = document.getElementById("levelSelect").value;
            
            // Save selection to localStorage so the new page can read it
            localStorage.setItem("mentora_degree", degree);
            localStorage.setItem("mentora_field", field);
            localStorage.setItem("mentora_level", level);
            
            // Open the constellation page in a new tab
            window.open("constellation.html", "_blank");
        });
    </script>
</body>
</html>
